<head>

  body { margin:0; background:var(--bg); color:var(--ink); min-height:100vh;

  h1 { font-size:48px; font-weight:700; letter-spacing:-1px; margin:0 0 6px; }
  .tag { color:var(--muted); margin:0 0 32px; }
  .links { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  a.btn { text-decoration:none; color:var(--ink); background:var(--card);
          border:1px solid var(--line); border-radius:12px; padding:12px 22px; font-weight:600; }

</head>
