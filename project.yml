name: Tesseriss
options:
  bundleIdPrefix: de.maindtec
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES

targets:
  Tesseriss:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TesserissApp
        excludes:
          - "Info.plist"
    resources:
      - path: TesserissApp/Resources
    info:
      path: TesserissApp/Info.plist
      properties:
        CFBundleDisplayName: Tesseriss
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: PaletteBackground
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
        UIViewControllerBasedStatusBarAppearance: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.maindtec.Tesseriss
        PRODUCT_NAME: Tesseriss
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_TESTABILITY: YES
      configs:
        Debug:
          DEVELOPMENT_TEAM: ""
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEVELOPMENT_TEAM: ""
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  TesserissTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TesserissTests
    dependencies:
      - target: Tesseriss
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.maindtec.TesserissTests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: "5.0"

schemes:
  Tesseriss:
    build:
      targets:
        Tesseriss: all
        TesserissTests: [test]
    test:
      targets:
        - TesserissTests
      gatherCoverageData: false
