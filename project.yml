name: Tesseriss
options:
  bundleIdPrefix: com.W00DSRULES
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES

targets:
  Tesseriss:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TesserissApp
        excludes:
          - "Info.plist"
    resources:
      - path: TesserissApp/Resources
    info:
      path: TesserissApp/Info.plist
      properties:
        CFBundleDisplayName: Tesseriss
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "2"
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: PaletteBackground
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
        UIViewControllerBasedStatusBarAppearance: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.W00DSRULES.Tesseriss
        PRODUCT_NAME: Tesseriss
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "8927GQ44C7"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          ENABLE_TESTABILITY: YES
        Release:
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  TesserissTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TesserissTests
    dependencies:
      - target: Tesseriss
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.W00DSRULES.TesserissTests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: "5.0"

  TesserissUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TesserissUITests
    dependencies:
      - target: Tesseriss
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.W00DSRULES.TesserissUITests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: "5.0"
        TEST_TARGET_NAME: Tesseriss

schemes:
  Tesseriss:
    build:
      targets:
        Tesseriss: all
        TesserissTests: [test]
        TesserissUITests: [test]
    test:
      targets:
        - TesserissTests
        - TesserissUITests
      gatherCoverageData: false
