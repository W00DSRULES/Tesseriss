name: tests

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: unit tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick simulator
        id: sim
        run: |
          set -euo pipefail
          # Prefer any modern iPhone simulator that's available on this runner.
          DEVICE=$(xcrun simctl list devices available -j \
            | python3 -c 'import json, sys; data = json.load(sys.stdin)["devices"]; \
                          best = next((d["name"] for runtime, devs in data.items() if "iOS" in runtime \
                                     for d in devs if d.get("isAvailable") and "iPhone" in d["name"]), None); \
                          print(best or "iPhone 16")')
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Picked simulator: $DEVICE"

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Tesseriss.xcodeproj \
            -scheme Tesseriss \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }},OS=latest" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
